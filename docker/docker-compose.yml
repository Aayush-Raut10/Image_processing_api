services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../static:/app/static
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../static:/app/static
    depends_on:
      - redis
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info

  redis:
    image: redis:7
    ports:
      - "6379:6379"